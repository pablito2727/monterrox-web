<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTERROX | Global Watch Corporation</title>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --bg: #000; --text: #eee; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
        
        /* Estilos Base */
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 3px solid var(--gold); text-align: center; background: #000; }
        .hero h1 { font-size: 5rem; color: var(--gold); margin: 0; letter-spacing: 10px; }
        
        nav { display: flex; justify-content: center; flex-wrap: wrap; padding: 15px; background: #050505; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--gold); }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; margin: 5px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        button:hover, .active { background: var(--gold); color: #000; }

        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        
        /* Tarjeta */
        .card { background: #111; border: 1px solid #333; padding: 15px; text-align: center; transition: 0.3s; }
        .card img { width: 100%; height: 200px; object-fit: cover; margin-bottom: 15px; background: #222; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .btn-card { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px; width: 100%; cursor: pointer; }
        .btn-card:hover { background: var(--gold); color: #000; }

        /* Modal (La pestaña de características) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 40px; border: 2px solid var(--gold); max-width: 500px; width: 90%; color: #fff; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; color: var(--gold); cursor: pointer; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>MONTERROX</h1>
        <p>EXCELENCIA EN RELOJERÍA</p>
    </header>

    <nav>
        <button onclick="filter('all')">Todos</button>
        <button onclick="filter('exclusivo')">Exclusivos</button>
        <button onclick="filter('limitada')">Limitada</button>
        <button onclick="filter('oferta')">Ofertas</button>
        <button onclick="filter('comedia')">Comedia</button>
    </nav>

    <main id="grid" class="container"></main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="m-title" style="color:var(--gold)"></h2>
            <p id="m-desc"></p>
            <ul id="m-features"></ul>
            <button class="btn-card" onclick="alert('Pedido registrado.')">ADQUIRIR</button>
        </div>
    </div>

    <script>
        // Base de datos (Los 63 relojes)
        const watches = [];
        const cats = ['exclusivo', 'limitada', 'oferta', 'comedia'];
        
        for(let i=1; i<=63; i++) {
            watches.push({ 
                id: i, 
                name: `Monterrox M-${i}`, 
                cat: cats[i % 4], 
                desc: "Reloj de alta precisión con materiales premium.",
                features: ["Movimiento: Automático Suizo", "Material: Acero 316L", "Garantía: 5 Años", "Sumergible: 100m"] 
            });
        }

        function render(list) {
            document.getElementById('grid').innerHTML = list.map(w => `
                <div class="card">
                    <img src="https://picsum.photos/seed/${w.id}/400/400" alt="${w.name}">
                    <h3>${w.name}</h3>
                    <button class="btn-card" onclick="openModal(${w.id})">VER DETALLES</button>
                </div>
            `).join('');
        }

        function openModal(id) {
            const w = watches.find(item => item.id === id);
            document.getElementById('m-title').innerText = w.name;
            document.getElementById('m-desc').innerText = w.desc;
            document.getElementById('m-features').innerHTML = w.features.map(f => `<li>${f}</li>`).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function filter(cat) {
            render(cat === 'all' ? watches : watches.filter(w => w.cat === cat));
        }

        render(watches);
    </script>
</body>
</html>
