<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTERROX | Global Watch Corporation</title>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --text: #eee; }
        body { font-family: 'Helvetica Neue', Helvetica, sans-serif; background-color: #000; color: var(--text); margin: 0; }
        
        /* Header */
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px solid var(--gold); text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)); }
        .hero h1 { font-size: 4rem; color: var(--gold); margin: 0; letter-spacing: 5px; }

        /* Navegación */
        nav { display: flex; justify-content: center; padding: 20px; background: #050505; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; margin: 5px; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-weight: bold; }
        button:hover, button.active { background: var(--gold); color: #000; }

        /* Grid */
        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; text-align: center; transition: 0.3s; }
        .card img { width: 100%; height: 200px; object-fit: cover; margin-bottom: 15px; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border: 1px solid var(--gold); max-width: 500px; width: 90%; color: #fff; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; color: var(--gold); }
    </style>
</head>
<body>

    <header class="hero">
        <h1>MONTERROX</h1>
        <p>EXCELENCIA Y PRECISIÓN GLOBAL</p>
    </header>

    <nav id="nav">
        <button onclick="filter('all')">Todos</button>
        <button onclick="filter('exclusivo')">Exclusivos</button>
        <button onclick="filter('limitada')">Limitada</button>
        <button onclick="filter('oferta')">Ofertas</button>
    </nav>

    <main id="grid" class="container"></main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="m-title" style="color:var(--gold)"></h2>
            <p id="m-desc"></p>
            <ul id="m-features"></ul>
            <button class="buy-btn" onclick="alert('Pedido procesado exitosamente.')">COMPRAR AHORA</button>
        </div>
    </div>

    <script>
        const watches = [
            { id: 1, name: "Gold Royal", price: 4500, cat: "exclusivo", desc: "El estándar de oro.", feat: ["Material: Oro 18k", "Cristal: Zafiro", "Movimiento: Suizo"] },
            { id: 2, name: "Titanium Pro", price: 1200, cat: "exclusivo", desc: "Resistencia absoluta.", feat: ["Material: Titanio", "Peso: 80g", "Sumergible: 300m"] },
            { id: 3, name: "Dark Night", price: 299, cat: "oferta", desc: "Diseño urbano oscuro.", feat: ["Material: Acero PVD", "Caja: 42mm", "Cuarzo"] },
            { id: 4, name: "Aviator Elite", price: 950, cat: "limitada", desc: "Precisión de piloto.", feat: ["Cronógrafo", "Esfera: Carbono", "Edición: 50 unidades"] },
            { id: 5, name: "Vintage 50s", price: 800, cat: "limitada", desc: "Clásico renovado.", feat: ["Correa: Piel auténtica", "Mecánico", "Garantía: 10 años"] },
            { id: 6, name: "Solar Speed", price: 150, cat: "oferta", desc: "Carga eterna.", feat: ["Energía: Solar", "Brújula", "Digital"] }
        ];

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map((w, i) => `
                <div class="card">
                    <img src="https://picsum.photos/seed/${w.id}/400/400" alt="${w.name}">
                    <h3>${w.name}</h3>
                    <p>${w.price} €</p>
                    <button class="buy-btn" onclick="openModal(${w.id})">VER DETALLES</button>
                </div>
            `).join('');
        }

        function openModal(id) {
            const w = watches.find(item => item.id === id);
            document.getElementById('m-title').innerText = w.name;
            document.getElementById('m-desc').innerText = w.desc;
            document.getElementById('m-features').innerHTML = w.feat.map(f => `<li>${f}</li>`).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function filter(cat) {
            if(cat === 'all') render(watches);
            else render(watches.filter(w => w.cat === cat));
        }

        render(watches);
    </script>
</body>
</html>
