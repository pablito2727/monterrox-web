<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTERROX | Global Watch Corporation</title>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --card: #111; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #fff; margin: 0; }
        .hero { padding: 60px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); font-size: 3rem; margin: 0; letter-spacing: 5px; }
        nav { display: flex; justify-content: center; gap: 10px; padding: 20px; position: sticky; top: 0; background: rgba(5,5,5,0.95); z-index: 100; border-bottom: 1px solid #333; }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        button:hover, .active { background: var(--gold); color: #000; }
        .container { max-width: 1200px; margin: 30px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 0 20px; }
        .card { background: var(--card); border: 1px solid #333; transition: 0.3s; padding: 15px; text-align: center; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #000; }
        .btn-detalles { margin-top: 15px; width: 100%; padding: 10px; background: transparent; color: var(--gold); border: 1px solid var(--gold); cursor: pointer; }
        .btn-detalles:hover { background: var(--gold); color: #000; }
        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .content { background: #1a1a1a; padding: 30px; border: 1px solid var(--gold); width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div class="hero"><h1>MONTERROX</h1><p>GLOBAL COLLECTION</p></div>

    <nav id="menu">
        <button onclick="filter('novedades')">Novedades</button>
        <button onclick="filter('exclusivo')">Exclusivos</button>
        <button onclick="filter('limitada')">Limitada</button>
        <button onclick="filter('oferta')">Ofertas</button>
        <button onclick="filter('comedia')">Comedia</button>
    </nav>

    <main id="grid" class="container"></main>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="content" onclick="event.stopPropagation()">
            <h2 id="m-title" style="color:var(--gold)"></h2>
            <p id="m-desc"></p>
            <button onclick="closeModal()">CERRAR</button>
        </div>
    </div>

    <script>
        // URLs de imágenes reales de relojes (Unsplash de alta calidad)
        const watchImages = [
            "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=400",
            "https://images.unsplash.com/photo-1524805611974-575be7b7e3c5?q=80&w=400",
            "https://images.unsplash.com/photo-1533139502658-0198f920d8e8?q=80&w=400",
            "https://images.unsplash.com/photo-1614115167098-904c9977874a?q=80&w=400",
            "https://images.unsplash.com/photo-1612817159949-180bbc455799?q=80&w=400"
        ];

        const watches = [];
        const cats = ['novedades', 'exclusivo', 'limitada', 'oferta', 'comedia'];
        
        // Generador de 75 relojes (15 por cada categoría)
        cats.forEach(cat => {
            for(let i = 1; i <= 15; i++) {
                let name = `${cat.charAt(0).toUpperCase() + cat.slice(1)} Modelo ${i}`;
                let desc = `Reloj de precisión con acabado premium y materiales de alta calidad.`;
                let img = watchImages[i % watchImages.length];

                // Lógica especial para Comedia
                if(cat === 'comedia') {
                    const chistes = ["Reloj de Arena Digital", "Reloj 'Llegas Tarde'", "Reloj de Pizza", "Reloj Invisible", "Reloj con manecillas de espagueti"];
                    name = chistes[i % chistes.length];
                    desc = "Diseño absurdo. No intentes consultar la hora, solo disfruta del caos.";
                    img = "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=400"; // Imagen minimalista/rara
                }

                watches.push({ id: watches.length + 1, name, cat, desc, img });
            }
        });

        function render(list) {
            document.getElementById('grid').innerHTML = list.map(w => `
                <div class="card">
                    <img src="${w.img}" alt="Watch">
                    <h3>${w.name}</h3>
                    <button class="btn-detalles" onclick="openModal(${w.id})">DETALLES</button>
                </div>
            `).join('');
        }

        function filter(cat) {
            render(watches.filter(w => w.cat === cat));
        }

        function openModal(id) {
            const w = watches.find(item => item.id === id);
            document.getElementById('m-title').innerText = w.name;
            document.getElementById('m-desc').innerText = w.desc;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Carga inicial
        render(watches.filter(w => w.cat === 'novedades'));
    </script>
</body>
</html>
