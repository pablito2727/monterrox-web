<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTERROX | Global Corp</title>
    <style>
        :root { --gold: #D4AF37; --dark: #050505; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #000; color: #eee; margin: 0; }
        
        /* Estilos Corporativos */
        .hero { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 3px solid var(--gold); text-align: center; background: #000; }
        .hero h1 { font-size: 3.5rem; color: var(--gold); margin: 0; letter-spacing: 8px; }
        
        nav { display: flex; justify-content: center; padding: 15px; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; gap: 10px; }
        button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        button:hover, button.active { background: var(--gold); color: #000; }

        .container { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: #151515; border: 1px solid #333; padding: 10px; text-align: center; transition: 0.2s; }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .btn-detalles { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-detalles:hover { background: var(--gold); color: #000; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border: 2px solid var(--gold); max-width: 400px; width: 90%; text-align: center; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; cursor: pointer; color: var(--gold); font-size: 24px; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>MONTERROX</h1>
        <p>GLOBAL PRECISION TIMEKEEPING</p>
    </header>

    <nav>
        <button onclick="render(watches)">Todos</button>
        <button onclick="filter('exclusivo')">Exclusivos</button>
        <button onclick="filter('limitada')">Limitados</button>
        <button onclick="filter('oferta')">Ofertas</button>
        <button onclick="filter('comedia')">Comedia</button>
    </nav>

    <main id="grid" class="container"></main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="m-title" style="color:var(--gold)"></h2>
            <p id="m-desc"></p>
            <ul id="m-features" style="list-style: none; padding: 0;"></ul>
            <button class="btn-detalles" onclick="alert('Pedido procesado.')">ADQUIRIR</button>
        </div>
    </div>

    <script>
        const watches = [];
        const cats = ['exclusivo', 'limitada', 'oferta', 'comedia'];
        const descriptions = ["Acabado en oro 18k", "Edición limitada militar", "Diseño ergonómico", "Tecnología de cuarzo suizo", "Estilo vintage años 50"];

        // Generar 63 relojes con datos únicos
        for(let i=1; i<=63; i++) {
            watches.push({ 
                id: i, 
                name: `Monterrox Series ${100+i}`, 
                cat: cats[i % 4], 
                desc: descriptions[i % 5],
                features: ["Cristal de Zafiro", "Resistente al agua", "Correa ajustable", "Garantía de 5 años"]
            });
        }

        function render(list) {
            document.getElementById('grid').innerHTML = list.map(w => `
                <div class="card">
                    <img src="https://picsum.photos/seed/${w.id}/400/400" alt="Reloj">
                    <h4 style="margin: 10px 0;">${w.name}</h4>
                    <button class="btn-detalles" onclick="openModal(${w.id})">DETALLES</button>
                </div>
            `).join('');
        }

        function filter(cat) {
            render(watches.filter(w => w.cat === cat));
        }

        function openModal(id) {
            const w = watches.find(item => item.id === id);
            document.getElementById('m-title').innerText = w.name;
            document.getElementById('m-desc').innerText = w.desc;
            document.getElementById('m-features').innerHTML = w.features.map(f => `<li>${f}</li>`).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Carga inicial
        render(watches);
    </script>
</body>
</html>
